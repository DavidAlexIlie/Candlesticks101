<!DOCTYPE html>
<html>
<head>
    <title>License Key Generator</title>
</head>
<body>
    <h1>CandleSticks101 License Key Generator</h1>
    <button onclick="generateKeys()">Generate 50 Keys</button>
    <textarea id="keys" rows="20" cols="50" placeholder="Generated keys will appear here..."></textarea>
    
    <script>
        const generateLicenseKey = () => {
            const prefix = 'CK101';
            const timestamp = Date.now().toString(36);
            const random = Math.random().toString(36).substring(2, 8).toUpperCase();
            const checksum = btoa(timestamp + random).substring(0, 4).toUpperCase();
            
            return `${prefix}-${timestamp}-${random}-${checksum}`;
        };
        
        function generateKeys() {
            const keys = [];
            for (let i = 0; i < 50; i++) {
                keys.push(generateLicenseKey());
            }
            document.getElementById('keys').value = keys.join('\n');
        }
    </script>
</body>
</html>
